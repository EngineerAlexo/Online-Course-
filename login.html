<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Code Craft Ethiopia</title>
<link rel="stylesheet" href="auth.css">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
</head>
<body>

<div class="auth-container">
<h2>Login</h2>

<form id="loginForm">
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Password" required>
    <button type="submit">Login</button>
    <p>No account? <a href="register.html">Register</a></p>
</form>
</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCnPkV0kC7_HtlUYnfUzD_aO0U6rhfopf8",
  authDomain: "online-exam-system-33281.firebaseapp.com",
  projectId: "online-exam-system-33281",
  storageBucket: "online-exam-system-33281.firebasestorage.app",
  messagingSenderId: "690568730610",
  appId: "1:690568730610:web:fb2ec21aaf9642f8883d6b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Login form
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = this.querySelector('input[type="email"]').value.trim();
    const password = this.querySelector('input[type="password"]').value.trim();

    if (!email || !password) {
        alert("Email and password are required!");
        return;
    }

    auth.signInWithEmailAndPassword(email, password)
        .then(() => {
            alert("Login Successful!");
            // Redirect to previously clicked course or dashboard
            const redirectPage = sessionStorage.getItem("redirectAfterLogin") || "dashboard.html";
            sessionStorage.removeItem("redirectAfterLogin");
            window.location.href = redirectPage;
        })
        .catch(error => {
            console.error(error);
            alert("Error: " + error.message);
        });
});
</script>

</body>
</html>
